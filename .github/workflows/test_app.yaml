name: Print Hello, Github Actions!

on: 
  push:
    branches:
      - main
      - develop 
  pull_request:
    branches:
      - main
      - develop

jobs:
 print-hello:
  runs-on: ubuntu-latest
  steps:
  - name: Checkout code
    uses: actions/checkout@v4
    with:
     token: ${{ secrets.NEW_TOKEN }}
     fetch-depth: 0

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.10'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Run tests
    run: python -m pytest --cov=myapp --cov-report=xml --cov-fail-under=70
    
  - name: Upload coverage report
    uses: actions/upload-artifact@v4
    with:
      name: coverage-report
      path: coverage.xml
