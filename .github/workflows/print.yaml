name: Print Hello, Github Actions!

on: 
  push:
    branches:
      - main

jobs:
 print-hello:
  runs-on: ubuntu-latest
  steps:
  - name: Checkout code
    uses: actions/checkout@v4
    with:
     token: ${{ secrets.MY_PERSONAL_TOKEN }}
     fetch-depth: 0

  - name: Print
    run: echo "Hello, GitHub Actions!"
